<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LocalMind — AI Chat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #7c6af7;
    --accent2: #4ecdc4;
    --text: #e8e8f0;
    --text-dim: #6b6b85;
    --user-bg: #1e1b3a;
    --ai-bg: #111118;
    --error: #ff6b6b;
    --success: #4ecdc4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 0%, rgba(124,106,247,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(78,205,196,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(12px);
    position: relative;
    z-index: 10;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.5px;
  }

  .logo-text span { color: var(--accent); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .model-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }

  .model-select:focus { border-color: var(--accent); }
  .model-select option { background: var(--surface2); }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 8px var(--accent2);
    animation: pulse 2s infinite;
  }

  .status-dot.offline { background: var(--error); box-shadow: 0 0 8px var(--error); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Chat area */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    position: relative;
    z-index: 1;
    scroll-behavior: smooth;
  }

  .chat-container::-webkit-scrollbar { width: 4px; }
  .chat-container::-webkit-scrollbar-track { background: transparent; }
  .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Welcome screen */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 16px;
    text-align: center;
    animation: fadeIn 0.6s ease;
  }

  .welcome-icon {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 8px;
  }

  .welcome h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -1px;
  }

  .welcome p {
    color: var(--text-dim);
    font-size: 13px;
    max-width: 320px;
    line-height: 1.6;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
  }

  .suggestion {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 8px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .suggestion:hover {
    border-color: var(--accent);
    color: var(--text);
    background: rgba(124,106,247,0.1);
  }

  /* Messages */
  .message {
    display: flex;
    gap: 12px;
    animation: slideUp 0.3s ease;
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .message.user .avatar {
    background: linear-gradient(135deg, var(--accent), #9d8ff7);
  }

  .message.assistant .avatar {
    background: linear-gradient(135deg, var(--accent2), #3ab5ad);
  }

  .bubble {
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.7;
    max-width: calc(100% - 50px);
    position: relative;
  }

  .message.user .bubble {
    background: var(--user-bg);
    border: 1px solid rgba(124,106,247,0.3);
    border-top-right-radius: 4px;
  }

  .message.assistant .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  .bubble pre {
    background: #0d0d14;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 12px;
  }

  .bubble code {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: rgba(124,106,247,0.15);
    padding: 1px 5px;
    border-radius: 3px;
  }

  .bubble pre code {
    background: none;
    padding: 0;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 4px;
    padding: 16px;
    align-items: center;
  }

  .typing span {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Input area */
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(12px);
    position: relative;
    z-index: 10;
  }

  .input-wrapper {
    max-width: 820px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
    transition: border-color 0.2s;
  }

  .input-wrapper:focus-within { border-color: var(--accent); }

  textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    resize: none;
    min-height: 20px;
    max-height: 120px;
    line-height: 1.5;
  }

  textarea::placeholder { color: var(--text-dim); }

  .send-btn {
    background: linear-gradient(135deg, var(--accent), #9d8ff7);
    border: none;
    border-radius: 8px;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover { transform: scale(1.05); opacity: 0.9; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 16px; height: 16px; fill: white; }

  .input-footer {
    max-width: 820px;
    margin: 6px auto 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .api-url-input {
    background: none;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    outline: none;
    width: 280px;
    padding: 2px 0;
    transition: border-color 0.2s;
  }

  .api-url-input:focus { border-color: var(--accent); color: var(--text); }

  .hint { font-size: 10px; color: var(--text-dim); }

  /* Error toast */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--error);
    color: white;
    font-size: 12px;
    padding: 10px 18px;
    border-radius: 8px;
    z-index: 100;
    animation: fadeIn 0.3s ease;
  }

  /* Clear button */
  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .clear-btn:hover { border-color: var(--error); color: var(--error); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🧠</div>
    <div class="logo-text">Local<span>Mind</span></div>
  </div>
  <div class="header-right">
    <select class="model-select" id="modelSelect">
      <option value="gemini-1.5-flash">gemini-1.5-flash</option>
      <option value="gemini-1.5-pro">gemini-1.5-pro</option>
      <option value="gemini-2.0-flash">gemini-2.0-flash</option>
    </select>
    <div class="status-dot" id="statusDot"></div>
  </div>
</header>

<div class="chat-container" id="chatContainer">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🧠</div>
    <h1>LocalMind</h1>
    <p>Your local AI assistant powered by Gemini. Ask anything — code, analysis, creative writing.</p>
    <div class="suggestions">
      <div class="suggestion" onclick="useSuggestion(this)">Explain neural networks</div>
      <div class="suggestion" onclick="useSuggestion(this)">Write a Python script</div>
      <div class="suggestion" onclick="useSuggestion(this)">What is RAG?</div>
      <div class="suggestion" onclick="useSuggestion(this)">Summarize a topic</div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea
      id="messageInput"
      placeholder="Ask anything..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
  <div class="input-footer">
    <input
      class="api-url-input"
      id="apiUrl"
      placeholder="API URL: https://local-llm-stack-4.onrender.com"
      value="https://local-llm-stack-4.onrender.com"
    />
    <button class="clear-btn" onclick="clearChat()">clear chat</button>
  </div>
</div>

<script>
  let messages = [];
  let isLoading = false;

  // Auto-resize textarea
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function useSuggestion(el) {
    document.getElementById('messageInput').value = el.textContent;
    sendMessage();
  }

  function clearChat() {
    messages = [];
    const container = document.getElementById('chatContainer');
    container.innerHTML = '';
    const welcome = document.createElement('div');
    welcome.className = 'welcome';
    welcome.id = 'welcome';
    welcome.innerHTML = `
      <div class="welcome-icon">🧠</div>
      <h1>LocalMind</h1>
      <p>Your local AI assistant powered by Gemini. Ask anything — code, analysis, creative writing.</p>
      <div class="suggestions">
        <div class="suggestion" onclick="useSuggestion(this)">Explain neural networks</div>
        <div class="suggestion" onclick="useSuggestion(this)">Write a Python script</div>
        <div class="suggestion" onclick="useSuggestion(this)">What is RAG?</div>
        <div class="suggestion" onclick="useSuggestion(this)">Summarize a topic</div>
      </div>`;
    container.appendChild(welcome);
  }

  function addMessage(role, content) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const container = document.getElementById('chatContainer');
    const div = document.createElement('div');
    div.className = `message ${role}`;

    const avatar = role === 'user' ? '👤' : '🤖';
    const formattedContent = formatContent(content);

    div.innerHTML = `
      <div class="avatar">${avatar}</div>
      <div class="bubble">${formattedContent}</div>
    `;

    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function formatContent(text) {
    // Code blocks
    text = text.replace(/```(\w+)?\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    // Inline code
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Bold
    text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    // Line breaks
    text = text.replace(/\n/g, '<br>');
    return text;
  }

  function showTyping() {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const container = document.getElementById('chatContainer');
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = 'typing';
    div.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble">
        <div class="typing">
          <span></span><span></span><span></span>
        </div>
      </div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  function setStatus(online) {
    const dot = document.getElementById('statusDot');
    dot.className = 'status-dot' + (online ? '' : ' offline');
  }

  async function sendMessage() {
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text || isLoading) return;

    const apiBase = document.getElementById('apiUrl').value.trim().replace(/\/$/, '');
    const model = document.getElementById('modelSelect').value;

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;

    messages.push({ role: 'user', content: text });
    addMessage('user', text);
    showTyping();

    try {
      const res = await fetch(`${apiBase}/v1/chat/completions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model,
          messages,
          max_tokens: 1000,
          temperature: 0.7
        })
      });

      removeTyping();

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || 'API error');
      }

      const data = await res.json();
      const reply = data.choices[0].message.content;
      messages.push({ role: 'assistant', content: reply });
      addMessage('assistant', reply);
      setStatus(true);

    } catch (err) {
      removeTyping();
      setStatus(false);
      showToast('Error: ' + err.message);
      messages.pop(); // remove failed user message
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }

  // Check API on load
  window.addEventListener('load', async () => {
    const apiBase = document.getElementById('apiUrl').value.trim();
    try {
      const res = await fetch(`${apiBase}/health`);
      setStatus(res.ok);
    } catch {
      setStatus(false);
    }
  });
</script>
</body>
</html>
