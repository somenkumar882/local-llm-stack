version: "3.9"

# Full Local LLM Stack
# Usage: docker-compose up -d
# Then open: http://localhost:3000

services:

  # ── Local LLM API ────────────────────────────────────────────────────────
  llm-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: llm-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models          # mount your GGUF models
    environment:
      - N_GPU_LAYERS=${GPU_LAYERS:--1}
      - N_CTX=4096
      - N_BATCH=512
    # Uncomment for NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Open WebUI (browser chat) ─────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://llm-api:8000/v1
      - OPENAI_API_KEY=not-needed
      - WEBUI_AUTH=false              # disable login for local use
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      llm-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  open-webui-data:
